<div class="module-card">
    <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Verificar Identidad</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Por favor confirma que la imagen es correcta</p>

    <!-- Captured snapshot -->
    <div style="width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--primary-blue); margin-bottom: 16px; background: #cbd5e1;">
        <canvas id="snapshot-canvas" style="width: 100%; display: block;"></canvas>
    </div>

    <!-- Detection status -->
    <div style="
        background: #eff6ff;
        padding: 12px 16px;
        border-radius: 10px;
        border: 1px solid #bfdbfe;
        color: #1d4ed8;
        font-size: 0.875rem;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
        text-align: left;
        width: 100%;
    ">
        <i class="fas fa-check-circle" style="font-size: 1.1rem; flex-shrink: 0;"></i>
        <span><strong>Identificación detectada:</strong> La imagen cumple con los requisitos de calidad</span>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%;">
        <button id="btn-retry" class="btn-secondary">Reintentar</button>
        <button id="btn-confirm" class="btn-primary">Confirmar</button>
    </div>
</div>
