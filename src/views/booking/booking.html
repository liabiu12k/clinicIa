<div class="module-card">
    <div class="benefit-icon" style="width: 80px; height: 80px; margin-bottom: 20px;">
        <i class="fas fa-calendar-check" style="font-size: 2.5rem;"></i>
    </div>
    <h2 style="margin-bottom: 8px;">Reserva de Cita</h2>
    <p style="color: var(--text-muted); margin-bottom: 30px;">Selecciona la especialidad para tu atención</p>

    <div style="width: 100%; text-align: left; margin-bottom: 25px;">
        <label style="display: block; font-size: 0.875rem; font-weight: 700; margin-bottom: 8px;">Especialidad Médica</label>
        <select id="specialty" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #e2e8f0; font-family: inherit; background: #fff;">
            <option value="Cardiología">Cardiología</option>
            <option value="Neurología">Neurología</option>
            <option value="Pediatría">Pediatría</option>

    </div>

    <button id="btn-book" class="btn-primary">Confirmar Reserva</button>
</div>
